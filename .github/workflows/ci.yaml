name: Complete DevOps Project Pipeline

on:
  push:
    branches:
      - master

jobs:
  build-and-push:
    name: Build & Push to Docker Hub
    runs-on: ubuntu-latest

    steps:

      # Step 1: Check out the repository code
      - name: Checkout code
        uses: actions/checkout@v4

      # Step 2: Set the short SHA as an environment variable for image tagging
      - name: Set short SHA
        run: echo "SHORT_SHA=$(echo $GITHUB_SHA | cut -c1-7)" >> $GITHUB_ENV

      # Step 3: Set up Docker Buildx
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 4: Log in to Docker Hub using GitHub Secrets
      # Go to: Settings → Secrets and variables → Actions
      # Add: DOCKER_USERNAME and DOCKER_HUB_TOKEN
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      # Step 5: Build and push with both SHA and latest tags
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            sirecloud/complete-devops-project:${{ env.SHORT_SHA }}
            sirecloud/complete-devops-project:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max